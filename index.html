<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbwmxT9NtECTXvkYfnM3tTDxCp63SzHyvA7OmsBHtAoALi1LCIJ5bh5ZEjse5GpDwESP/exec";
let allData = [];
let filteredData = [];



function openForm(url){
    window.open(url, "_blank");
}

async function loadData(){
    try{
        const response =
            await fetch(API_URL);
        allData =
            await response.json();
        document.getElementById("loading")
            .style.display = "none";
        // isi combo tahun
        tampilData();
    }
    catch(err){
        document.getElementById("loading")
            .innerHTML =
            "Gagal load data";
        console.log(err);
    }
}


let ratCharts = [];

function openDashboard(){
    document.getElementById(
        "dashboardModal"
    ).style.display = "block";
    buatGrafikRAT();
}

function closeDashboard(){
    document.getElementById(
        "dashboardModal"
    ).style.display = "none";
}

function toggleGrafik(cb){
    if(cb.value=="all" && cb.checked){
        document
        .querySelectorAll(
            '.toolbar input[type=checkbox]'
        )
        .forEach(x=>{
            x.checked = false;
        });
        cb.checked = true;
    }else{
        document.querySelector(
            'input[value=all]'
        ).checked = false;
    }
}

function buatGrafikRAT(){
    // destroy chart lama
    ratCharts.forEach(x=>x.destroy());
    ratCharts = [];
    const container =
        document.getElementById(
            "dashboardCharts"
        );
    container.innerHTML = "";
    const checks =
        document.querySelectorAll(
            '.toolbar input[type=checkbox]:checked'
        );
    let fields = [];
    checks.forEach(c=>{
        if(c.value=="all"){
            fields = [
                {
                    field:"anggota",
                    title:"JUMLAH ANGGOTA"
                },
                {
                    field:"aset",
                    title:"NILAI ASSET"
                },
                {
                    field:"omzet",
                    title:"TOTAL OMZET"
                },
                {
                    field:"ebitda",
                    title:"PEROLEHAN EBITDA"
                },
                {
                    field:"shu",
                    title:"PEROLEHAN SHU"
                },
                {
                    field:"capital",
                    title:"MODAL AKHIR"
                },
                {
                    field:"neraca",
                    title:"NILAI NERACA"
                }
            ];
        }else{
            let title = "";
            switch(c.value){
                case "anggota":
                    title = "JUMLAH ANGGOTA";
                    break;
                case "aset":
                    title = "NILAI ASSET";
                    break;
                case "omzet":
                    title = "TOTAL OMZET";
                    break;
                case "ebitda":
                    title = "PEROLEHAN EBITDA";
                    break;
                case "shu":
                    title = "PEROLEHAN SHU";
                    break;
                case "capital":
                    title = "MODAL AKHIR";
                    break;
                case "neraca":
                    title = "NILAI NERACA";
                    break;
            }
            fields.push({
                field:c.value,
                title:title
            });
        }
    });

    fields.forEach(item=>{
        buatChartItem(
            container,
            item.field,
            item.title
        );
    });
}

function buatChartItem(
    container,
    field,
    title
){
    let warna = "#1565c0";
    switch(field){
    case "anggota":
        warna = "#5e35b1";
        break;
    case "aset":
        warna = "#00897b";
        break;
    case "omzet":
        warna = "#1e88e5";
        break;
    case "ebitda":
        warna = "#43a047";
        break;
    case "shu":
        warna = "#fb8c00";
        break;
    case "capital":
        warna = "#e53935";
        break;
    case "neraca":
        warna = "#6d4c41";
        break;
    }
    // sorting terbaru kiri
    const dataSort =
        [...allData].sort(
            (a,b)=>
            parseInt(b.tahun) -
            parseInt(a.tahun)
        );
    const labels =
        dataSort.map(x=>x.tahun);
    const values =
        dataSort.map(x=>
            toMoney(x[field])
        );

    // box
    const box =
        document.createElement("div");
    box.className =
        "rat-chart-box";

    // canvas
    const canvas =
        document.createElement("canvas");
    box.appendChild(canvas);
    container.appendChild(box);

    // chart
    const chart =
        new Chart(canvas, {
        type:"bar",
        data:{
            labels:labels,
            datasets:[{
                label:title,
                data:values,
                backgroundColor:warna,
                borderColor:warna,
                data:values,
                barPercentage:0.70,
            }]
        },

        options:{
            responsive:true,
            maintainAspectRatio:false,
            layout:{
                padding:{
                    top:18,
                    bottom:5,
                    left:2,
                    right:2
                }
            },
            plugins:{
                legend:{
                    display:false
                },
                title:{
                    display:true,
                    text:title,
                    color:"#1565c0",
                    padding:{
                        top:15,
                        bottom:100
                    },
                    font:{
                        size:16,
                        weight:"bold"
                    }
                },

                datalabels:{
                    anchor:"end",
                    align:"top",
                    rotation:-90,
                    color:"#000",
                    font:{
                        size:10
                    },

                    formatter:function(value){

                        return value
                        .toLocaleString(
                            "id-ID",
                            {
                                minimumFractionDigits:0,
                                maximumFractionDigits:0
                            }
                        );
                    }
                }
            },
            scales:{
                x:{
                    ticks:{
                        font:{
                            size:11
                        }
                    }
                },

                y:{
                    beginAtZero:true,
                    ticks:{
                        maxTicksLimit:10,
                        font:{
                            size:8
                        },
                        callback:function(value){               
                            return value
                            .toLocaleString(
                                "id-ID"
                            );
                        }
                    }
                }
            }
        },
        plugins:[ChartDataLabels]
    });
    ratCharts.push(chart);
}

function tambahDataset(
    datasets,
    label,
    field
){
    datasets.push({
        label:label,
        data:
            allData.map(x=>
                parseFloat(
                    x[field]
                    .toString()
                    .replace(/\./g,"")
                    .replace(",",".")
                ) || 0
            )
    });
}

async function downloadDashboardRATPDF(){
    const { jsPDF } = window.jspdf;
    const dashboard =
        document.querySelector(
            ".dashboard-content"
        );
    const btn =
        dashboard.querySelector(
            ".download-dashboard-btn"
        );
    const closeBtn =
        dashboard.querySelector(
            ".close"
        );
    const header =
        document.getElementById(
            "pdfHeader"
        );
    // sembunyikan tombol
    btn.style.display = "none";
    closeBtn.style.display = "none";

    // tampilkan header pdf
    header.style.display = "flex";

    // ubah height auto supaya semua isi masuk
    const oldHeight =
        dashboard.style.height;
    dashboard.style.height = "auto";

    // tunggu render
    await new Promise(r =>
        setTimeout(r, 500)
    );

    // capture full dashboard
    const canvas =
        await html2canvas(
            dashboard,
            {
                scale:2,
                useCORS:true,
                backgroundColor:"#ffffff",
                windowWidth:
                    dashboard.scrollWidth,
                windowHeight:
                    dashboard.scrollHeight
            }
        );
    const imgData =
        canvas.toDataURL(
            "image/png"
        );

    // buat pdf landscape
    const pdf =
        new jsPDF({
            orientation:"landscape",
            unit:"mm",
            format:"a4"
        });

    // ukuran halaman
    const pageWidth =
        pdf.internal.pageSize.getWidth();
    const pageHeight =
        pdf.internal.pageSize.getHeight();

    // margin
    const margin = 5;
    const availableWidth =
        pageWidth - (margin * 2);
    const availableHeight =
        pageHeight - (margin * 2);

    // scaling proporsional
    const ratio =
        Math.min(
            availableWidth / canvas.width,
            availableHeight / canvas.height
        );
    const finalWidth =
        canvas.width * ratio;
    const finalHeight =
        canvas.height * ratio;

    // posisi center
    const x =
        (pageWidth - finalWidth) / 2;
    const y =
        (pageHeight - finalHeight) / 2;

    // gambar
    pdf.addImage(
        imgData,
        "PNG",
        x,
        y,
        finalWidth,
        finalHeight
    );

    // save
    pdf.save(
        "Dashboard_RAT.pdf"
    );

    // restore
    dashboard.style.height =
        oldHeight;
    header.style.display = "none";
    btn.style.display = "block";
    closeBtn.style.display = "block";
}


async function downloadDashboardPDF(){
    const { jsPDF } = window.jspdf;
    const dashboard =
        document.querySelector(".dashboard-content");
    const btn =
        dashboard.querySelector(
        ".download-dashboard-btn"
        );
        btn.style.display = "none";
    const closeBtn =
        dashboard.querySelector(
            ".close"
        );
        closeBtn.style.display = "none";
    // capture dashboard
    dashboard.style.height = "auto";
    const canvas =
        await html2canvas(dashboard, {
            scale:2,
            useCORS:true,
            backgroundColor:"#ffffff",
            windowWidth: dashboard.scrollWidth,
            windowHeight: dashboard.scrollHeight
        });
    const imgData =
        canvas.toDataURL("image/png");
    // ukuran canvas
    const imgWidth = canvas.width;
    const imgHeight = canvas.height;
    // buat PDF landscape
    const pdf =
        new jsPDF({
            orientation:"landscape",
            unit:"mm",
            format:"a4"
        });
    // ukuran halaman pdf
    const pageWidth =
        pdf.internal.pageSize.getWidth();
    const pageHeight =
        pdf.internal.pageSize.getHeight();
    // margin
    const margin = 5;
    // area tersedia
    const availableWidth =
        pageWidth - (margin * 2);
    const availableHeight =
        pageHeight - (margin * 2);
    // hitung rasio
    const ratio =
        Math.min(
            availableWidth / imgWidth,
            availableHeight / imgHeight
        );
    // ukuran final
    const finalWidth =
        imgWidth * ratio;
    const finalHeight =
        imgHeight * ratio;
    // posisi center
    const x =
        (pageWidth - finalWidth) / 2;
    const y =
        (pageHeight - finalHeight) / 2;
    // masukkan gambar
    pdf.addImage(
        imgData,
        "PNG",
        x,
        y,
        finalWidth,
        finalHeight
    );
    // download
    pdf.save("Dashboard_Tilik.pdf");
    dashboard.style.height = "96vh";
    btn.style.display = "block";
    closeBtn.style.display = "block";
}


function showPDF(fileId){
    const previewLink =

        fileId +

        "pdfModal"

    document.getElementById(
        "pdfFrame"
    ).src = previewLink;
}

function closePDF(){
    document.getElementById("pdfModal")

    document.getElementById("pdfFrame")
        .src = "";
}


function tampilData(){
    const list =
        document.getElementById("listData");
    list.innerHTML = "";
    // urut tahun terbaru
    allData.sort((a,b)=>
        parseInt(b.tahun) -
        parseInt(a.tahun)
    );
    allData.forEach(x=>{
        const tr =
            document.createElement("tr");
        tr.innerHTML = `
        <td align="center">
            ${x.tahun || ""}
        </td>
        <td align="center">
            ${formatTanggal(x.tanggal)}
        </td>
        <td align="center">
            ${formatAngka(x.anggota)}
        </td>
        <td align="right">
            ${formatAngka(x.aset)}
        </td>
        <td align="right">
            ${formatAngka(x.omzet)}
        </td>
        <td align="right">
            ${formatAngka(x.ebitda)}
        </td>
        <td align="right">
            ${formatAngka(x.shu)}
        </td>
        <td align="right">
            ${formatAngka(x.capital)}
        </td>
        <td align="right">
            ${formatAngka(x.neraca)}
        </td>
        <td align="center">
            <span class="pdf-icon"
                onclick="showPDF('${x.fileId}')">
                📄
            </span>
        </td>
        `;
        list.appendChild(tr);
    });
}

function formatHasil(nilai){
    if(nilai == null || nilai == "")
        return "0,00";
    return parseFloat(nilai)
        .toLocaleString(
            "id-ID",
            {
                minimumFractionDigits:2,
                maximumFractionDigits:2
            }
        );
}

function formatTanggal(tgl){
    if(!tgl) return "";
    tgl = tgl.toString();
    // pastikan 8 digit
    if(tgl.length != 8) return tgl;
    const tahun = tgl.substring(0,4);
    const bulan = tgl.substring(4,6);
    const hari = tgl.substring(6,8);
    return hari + "-" + bulan + "-" + tahun;
}

function toNumber(nilai){
    if(!nilai)
        return 0;
    // ubah ke string
    nilai = nilai.toString();
    // hapus titik ribuan
    nilai = nilai.replace(/\./g, "");
    // ganti koma jadi titik
    nilai = nilai.replace(",", ".");
    // convert number
    return parseFloat(nilai) || 0;
}

function toDecimal(nilai){
    if(!nilai)
        return 0;
    nilai = nilai.toString().trim();
    // hanya ganti koma ke titik
    nilai = nilai.replace(",", ".");
    return parseFloat(nilai) || 0;
}

function formatAngka(nilai){
    if(!nilai || nilai=="")
        return "0,00";
    nilai = nilai.toString();
    nilai =
        nilai.replace(/\./g,"")
             .replace(",", ".");
    return parseFloat(nilai)
        .toLocaleString(
            "id-ID",
            {
                minimumFractionDigits:2,
                maximumFractionDigits:2
            }
        );
}

function toMoney(nilai){
    if(!nilai)
        return 0;
    nilai = nilai.toString().trim();
    // hapus titik ribuan
    nilai =
        nilai.replace(/\./g, "");
    // ubah koma jadi titik
    nilai =
        nilai.replace(",", ".");
    return parseFloat(nilai) || 0;
}


function closeUnitDashboard(){
    document.getElementById(
        "unitDashboardModal"
    ).style.display = "none";
}

async function downloadUnitDashboardPDF(){
    const { jsPDF } = window.jspdf;
    const dashboard =
        document.querySelector(
            ".unit-dashboard-content"
        );
    const btn =
        dashboard.querySelector(
        ".download-dashboard-btn"
        );
        btn.style.display = "none";
    const closeBtn =
        dashboard.querySelector(
            ".close"
        );
        closeBtn.style.display = "none";
    dashboard.style.height = "auto";
    const canvas =
        await html2canvas(dashboard, {
            scale:2,
            useCORS:true,
            backgroundColor:"#ffffff",
            windowWidth: dashboard.scrollWidth,
            windowHeight: dashboard.scrollHeight
        });
    const imgData =
        canvas.toDataURL("image/png");
    const pdf =
        new jsPDF({
            orientation:"landscape",
            unit:"mm",
            format:"a4"
        });
    const pageWidth =
        pdf.internal.pageSize.getWidth();
    const pageHeight =
        pdf.internal.pageSize.getHeight();
    const margin = 5;
    const availableWidth =
        pageWidth - (margin * 2);
    const availableHeight =
        pageHeight - (margin * 2);
    const ratio =
        Math.min(
            availableWidth / canvas.width,
            availableHeight / canvas.height
        );
    const finalWidth =
        canvas.width * ratio;
    const finalHeight =
        canvas.height * ratio;
    const x =
        (pageWidth - finalWidth) / 2;
    const y =
        (pageHeight - finalHeight) / 2;
    pdf.addImage(
        imgData,
        "PNG",
        x,
        y,
        finalWidth,
        finalHeight
    );
    pdf.save("Dashboard_Unit.pdf");
    dashboard.style.height = "96vh";
    btn.style.display = "block";
    closeBtn.style.display = "block";
}

loadData();
